name: Build and Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "YouTubeDownloader" --icon="imgs/logo.ico" --distpath "dist" main.py
        shell: cmd

      - name: Show build output
        run: |
          echo "=== Build Output ==="
          dir dist
        shell: cmd

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTubeDownloader.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "YouTubeDownloader" --icon="imgs/logo.icns" main.py

      - name: Show build output
        run: |
          echo "=== Build Output ==="
          ls -la dist/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTubeDownloader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "YouTubeDownloader" --icon="imgs/logo.png" main.py

      - name: Show build output
        run: |
          echo "=== Build Output ==="
          ls -la dist/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTubeDownloader
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}